{{ define "main" }}
<div class="gradient-hero pt-28 pb-16 px-4">
  <div class="max-w-[1200px] mx-auto">
    <h1 class="text-3xl md:text-5xl font-heading font-bold text-white">{{ .Title }}</h1>
    <div class="flex flex-wrap items-center gap-4 mt-3 text-white/80 text-sm">
      {{ if .Date }}
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2 January 2006" }}</time>
      {{ end }}
      {{ if .Params.tags }}
        <div class="flex flex-wrap gap-2">
          {{ range .Params.tags }}
            <span class="text-xs font-semibold text-white bg-white/20 px-2 py-0.5 rounded-full">{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </div>
</div>
<div class="max-w-[800px] mx-auto px-4 sm:px-6 lg:px-8 py-12">
  {{ if .Params.image }}
    <img src="{{ .Params.image }}" alt="{{ .Title }}" class="w-full rounded-xl mb-8">
  {{ end }}
  <article class="prose prose-lg max-w-none prose-headings:font-heading prose-a:text-[#00843D]">
    {{ .Content }}
  </article>
  <div class="mt-10 pt-8 border-t border-gray-200">
    <a href="/berita/" class="btn-outline">&larr; Kembali ke Berita</a>
  </div>
</div>
{{ end }}
